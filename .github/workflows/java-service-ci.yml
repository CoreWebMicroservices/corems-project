name: Java Service CI

on:
  workflow_call:
    inputs:
      service-name:
        description: 'Service name (e.g., user-ms, communication-ms)'
        required: true
        type: string
      java-version:
        description: 'Java version to use'
        required: false
        type: string
        default: '25'
      maven-args:
        description: 'Additional Maven arguments'
        required: false
        type: string
        default: ''
      publish-artifacts:
        description: 'Publish Maven artifacts to GitHub Packages'
        required: false
        type: boolean
        default: false
      publish-clients:
        description: 'Publish API and Client modules to GitHub Packages (for cross-service dependencies)'
        required: false
        type: boolean
        default: false
      build-docker:
        description: 'Build Docker image'
        required: false
        type: boolean
        default: false
      push-docker:
        description: 'Push Docker image to registry'
        required: false
        type: boolean
        default: false
      run-sonarqube:
        description: 'Run SonarQube analysis'
        required: false
        type: boolean
        default: false
      docker-registry:
        description: 'Docker registry (ghcr.io or docker.io)'
        required: false
        type: string
        default: 'ghcr.io'
    secrets:
      github-token:
        description: 'GitHub token for package access'
        required: true
      docker-username:
        description: 'Docker registry username'
        required: false
      docker-password:
        description: 'Docker registry password'
        required: false
      sonar-token:
        description: 'SonarQube token'
        required: false
      sonar-host-url:
        description: 'SonarQube server URL'
        required: false

permissions:
  contents: read
  packages: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Maven with GitHub Packages
        uses: CoreWebMicroservices/corems-project/.github/actions/setup-maven@main
        with:
          github-token: ${{ secrets.github-token }}
          github-actor: ${{ github.actor }}
          java-version: ${{ inputs.java-version }}

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Display Workflow Configuration
        run: |
          echo "=== Workflow Configuration ==="
          echo "Service Name: ${{ inputs.service-name }}"
          echo "Java Version: ${{ inputs.java-version }}"
          echo "Publish Clients: ${{ inputs.publish-clients }}"
          echo "Publish Artifacts: ${{ inputs.publish-artifacts }}"
          echo "Build Docker: ${{ inputs.build-docker }}"
          echo "Push Docker: ${{ inputs.push-docker }}"
          echo "Run SonarQube: ${{ inputs.run-sonarqube }}"
          echo "Event: ${{ github.event_name }}"
          echo "Branch: ${{ github.ref }}"
          echo "=============================="

      - name: Build API module
        run: |
          # Extract base service name (remove -ms suffix if present)
          SERVICE_BASE="${{ inputs.service-name }}"
          SERVICE_BASE="${SERVICE_BASE%-ms}"
          
          if [ -d "${SERVICE_BASE}-api" ]; then
            echo "Building ${SERVICE_BASE}-api module..."
            mvn clean install -pl ${SERVICE_BASE}-api -am -DskipTests=true -s ~/.m2/settings.xml ${{ inputs.maven-args }}
          else
            echo "No ${SERVICE_BASE}-api module found, skipping..."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.github-token }}

      - name: Build Client module
        run: |
          # Extract base service name (remove -ms suffix if present)
          SERVICE_BASE="${{ inputs.service-name }}"
          SERVICE_BASE="${SERVICE_BASE%-ms}"
          
          if [ -d "${SERVICE_BASE}-client" ]; then
            echo "Building ${SERVICE_BASE}-client module..."
            mvn clean install -pl ${SERVICE_BASE}-client -am -DskipTests=true -s ~/.m2/settings.xml ${{ inputs.maven-args }}
          else
            echo "No ${SERVICE_BASE}-client module found, skipping..."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.github-token }}

      - name: Publish API and Client Modules to GitHub Packages
        if: inputs.publish-clients && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "Publishing API and Client modules to GitHub Packages..."
          
          # Extract base service name (remove -ms suffix if present)
          SERVICE_BASE="${{ inputs.service-name }}"
          SERVICE_BASE="${SERVICE_BASE%-ms}"
          
          # Publish API module if exists
          if [ -d "${SERVICE_BASE}-api" ]; then
            echo "Publishing ${SERVICE_BASE}-api module..."
            mvn deploy -pl ${SERVICE_BASE}-api -DskipTests=true -s ~/.m2/settings.xml ${{ inputs.maven-args }}
          else
            echo "No ${SERVICE_BASE}-api module found, skipping..."
          fi
          
          # Publish Client module if exists
          if [ -d "${SERVICE_BASE}-client" ]; then
            echo "Publishing ${SERVICE_BASE}-client module..."
            mvn deploy -pl ${SERVICE_BASE}-client -DskipTests=true -s ~/.m2/settings.xml ${{ inputs.maven-args }}
          else
            echo "No ${SERVICE_BASE}-client module found, skipping..."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.github-token }}

      - name: Build Service module
        run: |
          # Extract base service name (remove -ms suffix if present)
          SERVICE_BASE="${{ inputs.service-name }}"
          SERVICE_BASE="${SERVICE_BASE%-ms}"
          
          if [ -d "${SERVICE_BASE}-service" ]; then
            echo "Building ${SERVICE_BASE}-service module..."
            mvn clean install -pl ${SERVICE_BASE}-service -am -DskipTests=true -s ~/.m2/settings.xml ${{ inputs.maven-args }}
          else
            echo "Building entire project..."
            mvn clean install -DskipTests=true -s ~/.m2/settings.xml ${{ inputs.maven-args }}
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.github-token }}

      - name: Run Unit Tests
        run: mvn test -s ~/.m2/settings.xml ${{ inputs.maven-args }}
        env:
          GITHUB_TOKEN: ${{ secrets.github-token }}

      - name: Run SonarQube Analysis
        if: inputs.run-sonarqube
        run: |
          mvn sonar:sonar \
            -Dsonar.projectKey=${{ github.repository_owner }}_${{ inputs.service-name }} \
            -Dsonar.organization=${{ github.repository_owner }} \
            -Dsonar.host.url=${{ secrets.sonar-host-url || 'https://sonarcloud.io' }} \
            -Dsonar.login=${{ secrets.sonar-token }} \
            ${{ inputs.maven-args }}
        env:
          GITHUB_TOKEN: ${{ secrets.github-token }}
          SONAR_TOKEN: ${{ secrets.sonar-token }}

      - name: Publish Maven Artifacts to GitHub Packages
        if: inputs.publish-artifacts
        run: mvn deploy -DskipTests=true ${{ inputs.maven-args }}
        env:
          GITHUB_TOKEN: ${{ secrets.github-token }}

      - name: Build Docker Image
        if: inputs.build-docker
        run: |
          if [ -f "docker/Dockerfile" ]; then
            OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
            docker build -f docker/Dockerfile -t ${{ inputs.docker-registry }}/${OWNER_LOWER}/${{ inputs.service-name }}:${{ github.sha }} .
            docker tag ${{ inputs.docker-registry }}/${OWNER_LOWER}/${{ inputs.service-name }}:${{ github.sha }} \
                       ${{ inputs.docker-registry }}/${OWNER_LOWER}/${{ inputs.service-name }}:latest
          else
            echo "No Dockerfile found, skipping Docker build..."
          fi

      - name: Log in to Docker Registry
        if: inputs.push-docker && inputs.build-docker
        uses: docker/login-action@v3
        with:
          registry: ${{ inputs.docker-registry }}
          username: ${{ secrets.docker-username || github.actor }}
          password: ${{ secrets.docker-password || secrets.github-token }}

      - name: Push Docker Image
        if: inputs.push-docker && inputs.build-docker
        run: |
          OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          docker push ${{ inputs.docker-registry }}/${OWNER_LOWER}/${{ inputs.service-name }}:${{ github.sha }}
          docker push ${{ inputs.docker-registry }}/${OWNER_LOWER}/${{ inputs.service-name }}:latest

      - name: Save Docker Image as Artifact
        if: inputs.build-docker && !inputs.push-docker
        run: |
          docker save ${{ inputs.docker-registry }}/${{ github.repository_owner }}/${{ inputs.service-name }}:${{ github.sha }} \
            | gzip > ${{ inputs.service-name }}-${{ github.sha }}.tar.gz

      - name: Upload Docker Image Artifact
        if: inputs.build-docker && !inputs.push-docker
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-${{ inputs.service-name }}
          path: ${{ inputs.service-name }}-${{ github.sha }}.tar.gz
          retention-days: 7
