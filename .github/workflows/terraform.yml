name: Terraform

on:
  workflow_call:
    inputs:
      terraform-version:
        description: 'Terraform version to use'
        required: false
        type: string
        default: '1.6.0'
      working-directory:
        description: 'Working directory for Terraform'
        required: false
        type: string
        default: 'infra'
      environment:
        description: 'Environment to deploy (dev, prod)'
        required: true
        type: string
      action:
        description: 'Terraform action (plan, apply, destroy)'
        required: true
        type: string
      aws-region:
        description: 'AWS region'
        required: false
        type: string
        default: 'eu-north-1'
      db-instance-class:
        description: 'RDS instance class'
        required: false
        type: string
        default: 'db.t3.micro'
      service-cpu:
        description: 'ECS task CPU units'
        required: false
        type: number
        default: 256
      service-memory:
        description: 'ECS task memory (MB)'
        required: false
        type: number
        default: 512
      service-count:
        description: 'Desired task count per service'
        required: false
        type: number
        default: 2
    secrets:
      aws-access-key-id:
        description: 'AWS access key ID'
        required: true
      aws-secret-access-key:
        description: 'AWS secret access key'
        required: true
      db-master-password:
        description: 'Database master password'
        required: true
      mq-password:
        description: 'RabbitMQ password'
        required: true
      jwt-secret:
        description: 'JWT secret key'
        required: true

jobs:
  terraform:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform-version }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.aws-access-key-id }}
          aws-secret-access-key: ${{ secrets.aws-secret-access-key }}
          aws-region: ${{ inputs.aws-region }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Init
        run: terraform init -backend-config="key=${{ inputs.environment }}/terraform.tfstate"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        if: inputs.action == 'plan' || inputs.action == 'apply'
        run: |
          terraform plan \
            -var="environment=${{ inputs.environment }}" \
            -var="aws_region=${{ inputs.aws-region }}" \
            -var="db_master_password=${{ secrets.db-master-password }}" \
            -var="mq_password=${{ secrets.mq-password }}" \
            -var="jwt_secret=${{ secrets.jwt-secret }}" \
            -var="db_instance_class=${{ inputs.db-instance-class }}" \
            -var="service_cpu=${{ inputs.service-cpu }}" \
            -var="service_memory=${{ inputs.service-memory }}" \
            -var="service_desired_count=${{ inputs.service-count }}" \
            -out=tfplan
        
      - name: Upload Plan
        if: inputs.action == 'plan'
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-${{ inputs.environment }}
          path: ${{ inputs.working-directory }}/tfplan
          retention-days: 7

      - name: Terraform Apply
        if: inputs.action == 'apply'
        run: terraform apply -auto-approve tfplan

      - name: Terraform Destroy
        if: inputs.action == 'destroy'
        run: |
          terraform destroy \
            -var="environment=${{ inputs.environment }}" \
            -var="aws_region=${{ inputs.aws-region }}" \
            -var="db_master_password=${{ secrets.db-master-password }}" \
            -var="mq_password=${{ secrets.mq-password }}" \
            -var="jwt_secret=${{ secrets.jwt-secret }}" \
            -var="db_instance_class=${{ inputs.db-instance-class }}" \
            -var="service_cpu=${{ inputs.service-cpu }}" \
            -var="service_memory=${{ inputs.service-memory }}" \
            -var="service_desired_count=${{ inputs.service-count }}" \
            -auto-approve

      - name: Terraform Output
        if: inputs.action == 'apply'
        run: terraform output -json > terraform-output.json

      - name: Upload Outputs
        if: inputs.action == 'apply'
        uses: actions/upload-artifact@v4
        with:
          name: terraform-output-${{ inputs.environment }}
          path: ${{ inputs.working-directory }}/terraform-output.json
          retention-days: 30
