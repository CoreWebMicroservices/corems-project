name: Deploy Infrastructure - Dev

on:
  push:
    branches:
      - main
    paths:
      - 'infra/**'
  workflow_dispatch:
    inputs:
      action:
        description: 'Terraform action'
        required: true
        type: choice
        options:
          - plan
          - apply
          - destroy
        default: 'plan'

jobs:
  deploy-dev:
    name: Deploy to Dev Environment
    uses: ./.github/workflows/terraform.yml
    with:
      working-directory: 'infra'
      environment: 'dev'
      action: ${{ github.event_name == 'push' && 'plan' || github.event.inputs.action }}
      terraform-version: '1.6.0'
      aws-region: 'eu-north-1'
      # Dev-specific settings (smaller, cheaper)
      db-instance-class: 'db.t3.micro'
      service-cpu: 256
      service-memory: 512
      service-count: 1
    secrets:
      aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_DEV }}
      aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_DEV }}
      db-master-password: ${{ secrets.DB_PASSWORD_DEV }}
      mq-password: ${{ secrets.MQ_PASSWORD_DEV }}
      jwt-secret: ${{ secrets.JWT_SECRET_DEV }}
